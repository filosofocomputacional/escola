<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prof. Leidy 📷</title>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    color: #fff;
  }

  /* ===== CORPO DA CÂMERA ===== */
  .camera-body {
    background: linear-gradient(145deg, #2c2c2c, #1a1a1a);
    border-radius: 20px;
    padding: 25px;
    max-width: 500px;
    width: 100%;
    box-shadow:
      0 20px 60px rgba(0,0,0,0.6),
      inset 0 2px 4px rgba(255,255,255,0.1);
    border: 2px solid #333;
    position: relative;
  }

  /* Faixa superior estilo câmera */
  .camera-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 15px;
    padding-bottom: 12px;
    border-bottom: 2px solid #444;
  }
  .brand {
    font-size: 1.4em;
    font-weight: bold;
    color: #e63946;
    letter-spacing: 2px;
    text-shadow: 0 0 10px rgba(230,57,70,0.5);
  }
  .led {
    width: 12px; height: 12px;
    background: #2a9d8f;
    border-radius: 50%;
    box-shadow: 0 0 8px #2a9d8f, inset 0 0 3px #fff;
  }

  /* Visor da câmera */
  .viewfinder {
    background: #000;
    border-radius: 12px;
    padding: 8px;
    border: 3px solid #444;
    margin-bottom: 15px;
    position: relative;
    aspect-ratio: 4/3;
    overflow: hidden;
  }
  #video, #photoPreview {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 6px;
    display: block;
  }
  #photoPreview { display: none; }

  /* Formulário de dados */
  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }
  .form-row input, .form-row select {
    flex: 1;
    padding: 10px;
    border: 2px solid #444;
    border-radius: 8px;
    background: #222;
    color: #fff;
    font-size: 0.95em;
  }
  .form-row input:focus, .form-row select:focus {
    outline: none;
    border-color: #e63946;
  }

  /* Botões de modo */
  .mode-buttons {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    margin-bottom: 15px;
  }
  .mode-btn {
    padding: 10px;
    background: #333;
    border: 2px solid #555;
    color: #fff;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.85em;
    transition: all 0.2s;
  }
  .mode-btn:hover { background: #444; }
  .mode-btn.active {
    background: #e63946;
    border-color: #e63946;
    box-shadow: 0 0 10px rgba(230,57,70,0.5);
  }

  /* Área dos Botões de Disparo/Ações */
  .shutter-area {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 12px;
    padding: 15px 0;
    border-top: 2px solid #444;
    flex-wrap: wrap;
  }
  .shutter {
    width: 70px; height: 70px;
    border-radius: 50%;
    background: linear-gradient(145deg, #e63946, #c1121f);
    border: 5px solid #fff;
    box-shadow: 0 0 0 4px #333, 0 5px 15px rgba(0,0,0,0.5);
    cursor: pointer;
    transition: transform 0.1s;
  }
  .shutter:active { transform: scale(0.95); }

  .secondary-btn {
    padding: 10px 15px;
    background: #444;
    border: 2px solid #666;
    color: #fff;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.85em;
  }
  .secondary-btn:hover { background: #555; }

  .success-btn {
    padding: 10px 20px;
    background: #2a9d8f;
    border: 2px solid #1d6f65;
    color: #fff;
    border-radius: 20px;
    cursor: pointer;
    font-size: 0.9em;
    font-weight: bold;
    transition: background 0.2s;
  }
  .success-btn:hover { background: #21867a; }

  /* Upload de arquivo */
  .file-upload {
    display: none;
    margin-bottom: 15px;
  }
  .file-upload.show { display: block; }
  .file-label {
    display: block;
    padding: 15px;
    background: #222;
    border: 2px dashed #555;
    border-radius: 8px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
  }
  .file-label:hover { border-color: #e63946; background: #2a2a2a; }
  #fileInput { display: none; }
  .file-name {
    margin-top: 8px;
    font-size: 0.85em;
    color: #aaa;
    word-break: break-all;
  }

  /* Status */
  .status {
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    text-align: center;
    font-size: 0.9em;
    display: none;
  }
  .status.show { display: block; }
  .status.info { background: #1e3a5f; color: #8ecae6; }
  .status.success { background: #2d5016; color: #b5e48c; }
  .status.error { background: #5f1e1e; color: #ffb4b4; }

  .progress-bar {
    height: 6px;
    background: #333;
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
    display: none;
  }
  .progress-bar.show { display: block; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #e63946, #ff6b6b);
    width: 0%;
    transition: width 0.3s;
  }

  @media (max-width: 480px) {
    .camera-body { padding: 15px; }
    .brand { font-size: 1.1em; }
    .form-row { flex-direction: column; }
    .shutter { width: 60px; height: 60px; }
  }
</style>
</head>
<body>

<div class="camera-body">
  <div class="camera-top">
    <div class="brand">Registro Inhotim</div>
    <div class="led"></div>
  </div>

  <div class="viewfinder">
    <video id="video" autoplay playsinline muted></video>
    <img id="photoPreview" alt="preview">
  </div>

  <div class="form-row">
    <input type="text" id="studentName" placeholder="Nome do aluno" required>
    <select id="studentClass" required>
      <option value="">Turma</option>
      <option value="ADM2">ADM2</option>
      <option value="ADM3">ADM3</option>
    </select>
  </div>
  
  <div class="form-row">
    <input type="text" id="photoMeaning" placeholder="Qual o significado deste registro?" required>
  </div>

  <div class="mode-buttons">
    <button class="mode-btn active" data-mode="photo">📷 Foto</button>
    <button class="mode-btn" data-mode="file">📎 Arquivo</button>
  </div>

  <div class="file-upload" id="fileUploadArea">
    <label for="fileInput" class="file-label">
      📁 Clique para selecionar um arquivo
    </label>
    <input type="file" id="fileInput">
    <div class="file-name" id="fileName"></div>
  </div>

  <div class="shutter-area">
    <button class="secondary-btn" id="switchCamera">🔄 Trocar</button>
    <button class="shutter" id="shutterBtn" title="Capturar Foto"></button>
    <button class="success-btn" id="sendBtn">🚀 Enviar</button>
    <button class="secondary-btn" id="resetBtn">↺ Reset</button>
  </div>

  <div class="status" id="status"></div>
  <div class="progress-bar" id="progressBar">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<script>
/* ============================================================
   ⚠️ CONFIGURAÇÃO - SUBSTITUA PELOS SEUS VALORES
   ============================================================ */
const CONFIG = {
  DRIVE_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbzS14mncJcxjOPZ_4PA22-BEaMGOChx00ZGcL6POEUuknR99QRSeJHNJ9hugzwQPYjR/exec",
  SHEETS_SCRIPT_URL: "https://script.google.com/macros/s/AKfycbxQm2QD0BZzCSKY9GcWnHji0TeNYjcv_n3uwcV7pBeKrC_nygD7Pv1N8V0bdOxhmdkdYQ/exec"
};
/* ============================================================ */

let stream = null;
let currentMode = 'photo';
let capturedBlob = null; // Armazena a foto capturada temporariamente
let recordedFile = null; // Armazena o arquivo selecionado no modo Arquivo
let facingMode = 'environment'; // ◄ ATUALIZADO: Começa com a câmera traseira

const video = document.getElementById('video');
const photoPreview = document.getElementById('photoPreview');
const shutterBtn = document.getElementById('shutterBtn');
const switchCameraBtn = document.getElementById('switchCamera');
const statusEl = document.getElementById('status');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const fileUploadArea = document.getElementById('fileUploadArea');
const fileInput = document.getElementById('fileInput');
const fileNameEl = document.getElementById('fileName');

async function startCamera() {
  try {
    if (stream) stream.getTracks().forEach(t => t.stop());
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: facingMode, width: { ideal: 1280 }, height: { ideal: 720 } },
      audio: false
    });
    video.srcObject = stream;
    video.style.display = 'block';
    photoPreview.style.display = 'none';
  } catch (err) {
    showStatus('Erro ao acessar câmera: ' + err.message, 'error');
  }
}

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    resetCapture();
    
    if(fileUploadArea) fileUploadArea.classList.toggle('show', currentMode === 'file');
    
    // Esconde os controles de câmera se estiver no modo arquivo
    switchCameraBtn.style.display = currentMode === 'file' ? 'none' : 'block';
    shutterBtn.style.display = currentMode === 'file' ? 'none' : 'block';
    
    if (currentMode !== 'file') startCamera();
  });
});

switchCameraBtn.addEventListener('click', () => {
  facingMode = facingMode === 'user' ? 'environment' : 'user';
  startCamera();
});

document.getElementById('resetBtn').addEventListener('click', resetCapture);

if(fileInput) {
  fileInput.addEventListener('change', (e) => {
    const f = e.target.files[0];
    if (f) {
      recordedFile = f;
      fileNameEl.textContent = '✓ ' + f.name + ' (' + (f.size/1024/1024).toFixed(2) + ' MB)';
    }
  });
}

function resetCapture() {
  capturedBlob = null;
  recordedFile = null;
  if(fileInput) fileInput.value = '';
  if(fileNameEl) fileNameEl.textContent = '';
  photoPreview.style.display = 'none';
  if (currentMode !== 'file') {
    video.style.display = 'block';
    startCamera();
  }
  hideStatus();
}

// O botão Shutter (vermelho) agora APENAS CAPTURA a imagem na tela
shutterBtn.addEventListener('click', () => {
  if (currentMode === 'photo') {
    capturePhoto();
  }
});

function capturePhoto() {
  const canvas = document.createElement('canvas');
  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  canvas.getContext('2d').drawImage(video, 0, 0);
  canvas.toBlob((blob) => {
    capturedBlob = blob; // Salva o blob na memória para enviar depois
    photoPreview.src = URL.createObjectURL(blob);
    photoPreview.style.display = 'block';
    video.style.display = 'none';
    showStatus('Foto capturada! Preencha os dados e clique em Enviar.', 'info');
  }, 'image/jpeg', 0.9);
}

// O NOVO BOTÃO ENVIAR (verde) faz a validação e envia os dados
document.getElementById('sendBtn').addEventListener('click', async () => {
  const name = document.getElementById('studentName').value.trim();
  const cls = document.getElementById('studentClass').value;
  const meaning = document.getElementById('photoMeaning').value.trim();

  if (!name || !cls || !meaning) {
    showStatus('Preencha nome, turma e o significado antes de enviar!', 'error');
    return;
  }

  if (currentMode === 'photo') {
    if (!capturedBlob) {
      showStatus('Tire uma foto primeiro usando o botão redondo vermelho!', 'error');
      return;
    }
    const file = new File([capturedBlob], `${cls} - ${name}.jpg`, { type: 'image/jpeg' });
    await uploadFile(file, name, cls, meaning);
  } else if (currentMode === 'file') {
    if (!recordedFile) {
      showStatus('Selecione um arquivo primeiro!', 'error');
      return;
    }
    await uploadFile(recordedFile, name, cls, meaning);
  }
});

async function uploadFile(file, name, cls, meaning) {
  const finalName = `${cls} - ${name}`;
  showStatus('Enviando para o Drive...', 'info');
  progressBar.classList.add('show');
  progressFill.style.width = '50%';

  try {
    const reader = new FileReader();
    const base64 = await new Promise((resolve, reject) => {
      reader.onload = () => resolve(reader.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const payload = {
      fileName: finalName + getExtension(file.name),
      mimeType: file.type,
      data: base64
    };

    // 1. Envia o arquivo para o Drive
    await fetch(CONFIG.DRIVE_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });

    progressFill.style.width = '90%';

    // 2. Registra os dados na Planilha
    await fetch(CONFIG.SHEETS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({
        name: name,
        class: cls,
        meaning: meaning,
        fileName: finalName + getExtension(file.name),
        timestamp: new Date().toISOString()
      })
    });

    progressFill.style.width = '100%';
    showStatus('✓ Enviado com sucesso!', 'success');
    
    document.getElementById('photoMeaning').value = ''; 
    setTimeout(resetCapture, 2500);
  } catch (err) {
    showStatus('Erro no envio: ' + err.message, 'error');
  }
}

function getExtension(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  return ext ? '.' + ext : '';
}

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = 'status show ' + type;
}

function hideStatus() {
  statusEl.className = 'status';
}

window.addEventListener('load', () => {
  if (currentMode !== 'file') startCamera();
});
</script>

</body>
</html>
