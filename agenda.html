<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda Telefônica - E.E Nova Contagem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 1200px;
            overflow: hidden;
        }

        /* LOGIN */
        .login-screen {
            padding: 60px 40px;
            text-align: center;
        }

        .login-screen h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .login-screen i {
            font-size: 4em;
            color: #667eea;
            margin-bottom: 20px;
        }

        .login-form {
            max-width: 400px;
            margin: 30px auto;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
        }

        /* APP */
        .app-screen {
            display: none;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header i {
            font-size: 2.5em;
            margin-bottom: 15px;
        }

        .tabs {
            display: flex;
            background: #f5f5f5;
            border-bottom: 2px solid #e0e0e0;
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            border: none;
            background: none;
        }

        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab:hover {
            background: #e8e8e8;
        }

        .tab-content {
            display: none;
            padding: 30px;
        }

        .tab-content.active {
            display: block;
        }

        /* SEARCH */
        .search-box {
            position: relative;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 16px;
            transition: all 0.3s;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-box i {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
            font-size: 1.2em;
        }

        .autocomplete-list {
       
            width: 100%;
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            margin-top: 5px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            z-index: 1000;
            display: none;
        }

        .autocomplete-item {
            padding: 12px 20px;
            cursor: pointer;
            border-bottom: 1px solid #f0f0f0;
            transition: background 0.2s;
        }

        .autocomplete-item:hover {
            background: #f5f5f5;
        }

        .autocomplete-item:last-child {
            border-bottom: none;
        }

        .student-card {
            background: #f9f9f9;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #667eea;
        }

        .student-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e0e0e0;
        }

        .student-name {
            font-size: 1.5em;
            color: #333;
            font-weight: 600;
        }

        .student-turma {
            background: #667eea;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
        }

        .info-section {
            margin-bottom: 20px;
        }

        .info-title {
            color: #667eea;
            font-size: 1.1em;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-item {
            background: white;
            padding: 12px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-item i {
            color: #667eea;
            font-size: 1.2em;
            width: 25px;
        }

        .info-item strong {
            color: #333;
        }

        /* BIRTHDAYS */
        .birthday-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .birthday-icon {
            font-size: 3em;
        }

        .birthday-info h3 {
            font-size: 1.3em;
            margin-bottom: 5px;
        }

        .birthday-info p {
            opacity: 0.9;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .no-results i {
            font-size: 4em;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        .logout-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- LOGIN SCREEN -->
        <div class="login-screen" id="loginScreen">
            <i class="fas fa-school"></i>
            <h1>Agenda Telefônica</h1>
            <p>E.E Nova Contagem</p>
            
            <form class="login-form" onsubmit="return login(event)">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" value="E.E Nova Contagem" readonly>
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" placeholder="Digite a senha" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
            </form>
        </div>

        <!-- APP SCREEN -->
        <div class="app-screen" id="appScreen">
            <div class="header" style="position: relative;">
                <button class="logout-btn" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Sair
                </button>
                <i class="fas fa-address-book"></i>
                <h1>Agenda Telefônica</h1>
                <p>E.E Nova Contagem</p>
            </div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('search')">
                    <i class="fas fa-search"></i> Buscar Aluno
                </button>
                <button class="tab" onclick="switchTab('birthdays')">
                    <i class="fas fa-birthday-cake"></i> Aniversariantes do Dia
                </button>
            </div>

            <!-- SEARCH TAB -->
            <div class="tab-content active" id="searchTab">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Digite o nome do aluno ou turma..." oninput="searchStudents()">
                    <i class="fas fa-search"></i>
                    <div class="autocomplete-list" id="autocompleteList"></div>
                </div>
                <div id="searchResults"></div>
            </div>

            <!-- BIRTHDAYS TAB -->
            <div class="tab-content" id="birthdaysTab">
                <div id="birthdayResults"></div>
            </div>
        </div>
    </div>

        // Login
        function login(event) {
            event.preventDefault();
            const password = document.getElementById('password').value;
            
            if (password === '8605') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'block';
                loadBirthdays();
            } else {
                window.location.href = 'https://www.globo.com';
            }
        }

        function logout() {
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('password').value = '';
        }

        // Tabs
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            if (tabName === 'birthdays') {
                loadBirthdays();
            }
        }

        // Search
        function searchStudents() {
            const query = document.getElementById('searchInput').value.toLowerCase().trim();
            const autocompleteList = document.getElementById('autocompleteList');
            const resultsDiv = document.getElementById('searchResults');
            
            if (query.length < 2) {
                autocompleteList.style.display = 'none';
                resultsDiv.innerHTML = '';
                return;
            }

            // Filter students
            const filtered = studentsData.filter(student => {
                return student.Aluno.toLowerCase().includes(query) || 
                       student.Turma.includes(query);
            }).slice(0, 10);

            // Show autocomplete
            if (filtered.length > 0) {
                autocompleteList.innerHTML = filtered.map(student => `
                    <div class="autocomplete-item" onclick="selectStudent(${student.ID})">
                        <i class="fas fa-user"></i> <strong>${student.Aluno}</strong> - Turma ${student.Turma}
                    </div>
                `).join('');
                autocompleteList.style.display = 'block';
            } else {
                autocompleteList.style.display = 'none';
            }
        }

        function selectStudent(id) {
            const student = studentsData.find(s => s.ID === id);
            displayStudent(student);
            document.getElementById('autocompleteList').style.display = 'none';
            document.getElementById('searchInput').value = student.Aluno;
        }

        // Birthdays
        function loadBirthdays() {
            const today = new Date();
            const todayDay = today.getDate();
            const todayMonth = today.getMonth() + 1;
            
            const birthdayStudents = studentsData.filter(student => {
                if (!student.Aniversario) return false;
                
                const parts = student.Aniversario.split('/');
                if (parts.length !== 3) return false;
                
                const birthDay = parseInt(parts[0]);
                const birthMonth = parseInt(parts[1]);
                
                return birthDay === todayDay && birthMonth === todayMonth;
            });

            const resultsDiv = document.getElementById('birthdayResults');
            
            if (birthdayStudents.length === 0) {
                resultsDiv.innerHTML = `
                    <div class="no-results">
                        <i class="fas fa-birthday-cake"></i>
                        <h3>Nenhum aniversariante hoje</h3>
                        <p>Não há alunos fazendo aniversário nesta data.</p>
                    </div>
                `;
            } else {
                resultsDiv.innerHTML = birthdayStudents.map(student => `
                    <div class="birthday-card">
                        <div class="birthday-icon">🎂</div>
                        <div class="birthday-info">
                            <h3>${student.Aluno}</h3>
                            <p><i class="fas fa-users"></i> Turma ${student.Turma}</p>
                            <p><i class="fas fa-calendar"></i> Aniversário: ${student.Aniversario}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Close autocomplete when clicking outside
        document.addEventListener('click', function(event) {
            if (!event.target.closest('.search-box')) {
                document.getElementById('autocompleteList').style.display = 'none';
            }
        });
