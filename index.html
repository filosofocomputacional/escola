<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Escolar - EE Nova Contagem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f6f8fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* CONTAINER PRINCIPAL ESTILO APP */
        .app-container {
            background: white;
            width: 100%;
            max-width: 480px; /* Mantém o formato slim de aplicativo */
            min-height: 85vh;
            border-radius: 24px;
            box-shadow: 0 12px 32px rgba(0,0,0,0.08);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* TELA DE LOGIN */
        .screen {
            padding: 32px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .app-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .app-header h2 {
            color: #1a73e8;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .app-header p {
            color: #70757a;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #4a4a4a;
            font-size: 14px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            background-color: #f8f9fa;
            transition: all 0.2s;
        }

        /* Campo de usuário travado */
        .input-group input[readonly] {
            background-color: #edf2f7;
            color: #718096;
            border-color: #e2e8f0;
            cursor: not-allowed;
        }

        .input-group input:focus {
            outline: none;
            border-color: #1a73e8;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(26, 115, 232, 0.15);
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-submit:active {
            background-color: #1557b0;
        }

        .error-msg {
            color: #d93025;
            margin-top: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
            font-weight: 500;
        }

        /* TELA DE FUNCIONALIDADES (DASHBOARD) */
        #dashboardScreen {
            display: none;
            justify-content: flex-start;
        }

        .dashboard-title {
            font-size: 20px;
            color: #202124;
            margin-bottom: 24px;
            text-align: center;
            font-weight: 700;
        }

        /* Grid em 2 colunas estilo App */
        .grid-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .app-card {
            background: #f8f9fa;
            border: 1px solid #e8eaed;
            border-radius: 18px;
            padding: 20px 12px;
            text-align: center;
            text-decoration: none;
            color: #3c4043;
            transition: transform 0.1s, background-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .app-card:active {
            transform: scale(0.96);
            background-color: #f1f3f4;
        }

        .app-card img {
            width: 56px;
            height: 56px;
            margin-bottom: 12px;
            object-fit: contain;
        }

        .app-card span {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="screen" id="loginScreen">
            <div class="app-header">
                <h2>EE Nova Contagem</h2>
                <p>Insira sua senha para acessar</p>
            </div>
            
            <div class="input-group">
                <label for="username">Usuário</label>
                <input type="text" id="username" value="escola estadual nova contagem" readonly tabindex="-1">
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Digite a senha de 4 dígitos" autofocus>
            </div>
            
            <button class="btn-submit" onclick="validarLogin()">Entrar</button>
            <div class="error-msg" id="errorMsg">Senha incorreta! Tente novamente.</div>
        </div>

        <div class="screen" id="dashboardScreen">
            <h1 class="dashboard-title">Funcionalidades Ativas</h1>
            
            <div class="grid-menu">
                <a href="https://filosofocomputacional.github.io/escola/agenda.html" class="app-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/3059/3059502.png" alt="Agenda">
                    <span>Agenda Telefônica</span>
                </a>

                <a href="https://filosofocomputacional.github.io/escola/boletim.html" class="app-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/2641/2641409.png" alt="Boletim">
                    <span>Boletim</span>
                </a>

                <a href="#" class="app-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/942/942748.png" alt="Funcionários">
                    <span>Agenda dos Funcionários</span>
                </a>

                <a href="#" class="app-card">
                    <img src="https://cdn-icons-png.flaticon.com/512/1091/1091916.png" alt="Arquivos">
                    <span>Arquivos</span>
                </a>
            </div>
        </div>

    </div>

    <script>
        // Foca automaticamente no campo de senha ao carregar a página
        window.onload = function() {
            document.getElementById('password').focus();
        };

        function validarLogin() {
            const senhaDigitada = document.getElementById('password').value.trim();
            const senhaCorreta = "8605";

            if (senhaDigitada === senhaCorreta) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('dashboardScreen').style.display = 'flex';
            } else {
                const errorElement = document.getElementById('errorMsg');
                errorElement.style.display = 'block';
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
            }
        }

        // Permite validar ao apertar Enter
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                validarLogin();
            }
        });
    </script>
</body>
</html>
