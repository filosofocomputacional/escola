<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesquisa de Livros</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Define a fonte Inter como padrão para todo o corpo */
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            /* Cor de fundo suave */
        }

        /* Estilos para o spinner de carregamento */
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3b82f6;
            /* Cor azul do Tailwind */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        /* Estilo para garantir que o texto da descrição não exceda 3 linhas */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col items-center py-8 px-4 sm:px-6 lg:px-8 bg-gray-100 text-gray-800">
    <div class="w-full max-w-2xl bg-white rounded-xl shadow-lg p-6 sm:p-8">
        <h1 class="text-3xl sm:text-4xl font-extrabold text-center text-blue-700 mb-6">Pesquisa de Livros</h1>

        <div class="flex flex-col sm:flex-row items-center space-y-4 sm:space-y-0 sm:space-x-4 mb-8">
            <input type="text" id="searchInput"
                placeholder="Digite o ISBN (ex: 9788535902778) ou o Título/Autor (ex: O Senhor dos Anéis)"
                class="flex-grow w-full px-5 py-3 border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-lg"
                aria-label="Campo para digitar o ISBN ou o título/autor do livro">

            <button id="searchButton"
                class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-opacity-75 flex items-center justify-center text-lg" aria-label="Botão para pesquisar o livro">
                <span id="buttonText" class="">Pesquisar</span>
                <div id="loadingSpinner" class="spinner ml-2 hidden"></div>
            </button>
        </div>

        <div id="messageArea" class="text-center font-semibold mb-6 hidden" role="alert"></div>

        <div id="allResultsContainer" class="mt-8">
            </div>

    </div>

    <script>
        // Função auxiliar para exibir mensagens
        function showMessage(message, className = 'text-gray-700') {
            const messageArea = document.getElementById('messageArea');
            messageArea.textContent = message;
            messageArea.className = `text-center font-semibold mb-6 ${className}`;
            if (message) {
                messageArea.classList.remove('hidden');
            } else {
                messageArea.classList.add('hidden');
            }
        }

        // Função auxiliar para limpar a área de resultados
        function clearResults() {
            const allResultsContainer = document.getElementById('allResultsContainer');
            allResultsContainer.innerHTML = ''; // Limpa todos os cards de resultados
            showMessage(''); // Limpa a mensagem de status
        }

        /**
         * Gera uma string MARC 21 simplificada com base nos dados do livro.
         * @param {object} bookData - Objeto com os dados do livro formatados.
         * @returns {string} String MARC 21 simplificada.
         */
        function generateSimpleMarc21(bookData) {
            let marc = [];
        
            // Título e Subtítulo (245)
            // O subtítulo é adicionado ao subcampo |b do campo 245
            let titleField = `245 10|a${bookData.title || 'Título Desconhecido'}`;
            if (bookData.subtitle) {
                titleField += `|b${bookData.subtitle}`;
            }
            marc.push(titleField);
        
            // Autor(es) (100 e 700)
            if (bookData.authors && bookData.authors.length > 0) {
                marc.push(`100 1 __|a${bookData.authors[0]}`); // Primeiro autor como autor principal (100)
                if (bookData.authors.length > 1) {
                    bookData.authors.slice(1).forEach(author => {
                        marc.push(`700 1 __|a${author}`); // Outros autores como entradas secundárias (700)
                    });
                }
            }
        
            // Publicação (Editora e Ano) (264)
            // A editora vai no subcampo |b e o ano no subcampo |c
            const publisher = bookData.publisher || 'Editora Desconhecida';
            const publishedDate = bookData.publishedDate ? bookData.publishedDate.substring(0, 4) : 'Data Desconhecida';
            marc.push(`264 1 |a|b${publisher}|c${publishedDate}`);
        
            // Descrição/Resumo (520)
            if (bookData.description) {
                const cleanedDescription = bookData.description.replace(/\n/g, ' ').replace(/\s\s+/g, ' ').trim();
                marc.push(`520 __|a${cleanedDescription}`);
            }
        
            // ISBN (020)
            if (bookData.isbn) {
                marc.push(`020 __|a${bookData.isbn}`);
            }
        
            // Número de páginas (300)
            if (bookData.pageCount) {
                marc.push(`300 __|a${bookData.pageCount} p.`);
            }
        
            // Categorias/Assuntos (650)
            if (bookData.categories) {
                let categories = bookData.categories;
                if (!Array.isArray(categories)) {
                    categories = [categories];
                }
                categories.forEach(category => {
                    marc.push(`650 __|a${category}`);
                });
            }

            // Campos adicionais que você já tinha no seu código.
            marc.push("090 __|a Estante  , Prateleira - ");
            marc.push("949 __|a ");
        
            return marc.join('\n');
        }


        /**
         * Renderiza um card de livro na tela.
         * @param {object} bookData - Objeto com os dados do livro formatados.
         * @param {HTMLElement} container - O elemento onde os cards serão adicionados.
         */
        function renderBookCard(bookData, container) {
            const card = document.createElement('div');
            card.className = 'bg-white rounded-lg shadow-md p-6 flex flex-col items-center text-center transition duration-300 ease-in-out transform hover:scale-105';

            const thumbnailUrl = bookData.cover || 'https://placehold.co/128x190/cbd5e1/4b5563?text=Sem+Capa';
            const title = bookData.title || 'Título Desconhecido';
            const authors = bookData.authors ? bookData.authors.join(', ') : '';
            const publisher = bookData.publisher || '';
            const publishedDate = bookData.publishedDate || '';
            const description = bookData.description || '';
            const pageCount = bookData.pageCount || '';
            const language = bookData.language ? bookData.language.toUpperCase() : '';
            const categories = bookData.categories ? (Array.isArray(bookData.categories) ? bookData.categories.join(', ') : bookData.categories) : '';


            card.innerHTML = `
                <img src="${thumbnailUrl}" alt="Capa do livro: ${title}" class="w-32 h-48 object-cover rounded mb-4 shadow">
                <h3 class="text-xl font-bold text-gray-800 mb-2">${title}</h3>
                <p class="text-gray-600 mb-1"><strong>Autor(es):</strong> ${authors}</p>
                <p class="text-gray-600 mb-1"><strong>Editora:</strong> ${publisher}</p>
                <p class="text-gray-600 mb-1"><strong>Publicação:</strong> ${publishedDate}</p>
                <p class="text-gray-600 mb-1"><strong>Páginas:</strong> ${pageCount}</p>
                <p class="text-gray-600 mb-1"><strong>Idioma:</strong> ${language}</p>
                <p class="text-gray-600 mb-1"><strong>Categorias:</strong> ${categories}</p>
                <p class="text-sm text-gray-500 mt-2 line-clamp-3">${description}</p>
                <p class="text-xs text-gray-400 mt-2">Fonte: <span class="font-semibold">${bookData.source}</span></p>
                <button class="copy-marc-btn mt-4 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold py-2 px-4 rounded-lg text-sm transition duration-150 ease-in-out">
                    Copiar MARC 21 (Básico)
                </button>
            `;

            // Adiciona o listener para o botão de copiar MARC 21
            const copyButton = card.querySelector('.copy-marc-btn');
            copyButton.addEventListener('click', async () => {
                const marc21String = generateSimpleMarc21(bookData);
                try {
                    await navigator.clipboard.writeText(marc21String);
                    copyButton.textContent = 'Copiado!';
                    copyButton.classList.add('bg-green-500', 'text-white');
                    copyButton.classList.remove('bg-gray-200', 'hover:bg-gray-300', 'text-gray-800');
                    setTimeout(() => {
                        copyButton.textContent = 'Copiar MARC 21 (Básico)';
                        copyButton.classList.remove('bg-green-500', 'text-white');
                        copyButton.classList.add('bg-gray-200', 'hover:bg-gray-300', 'text-gray-800');
                    }, 2000);
                } catch (err) {
                    console.error('Erro ao copiar MARC 21: ', err);
                    alert('Erro ao copiar MARC 21. Por favor, tente novamente.');
                }
            });

            container.appendChild(card);
        }

        /**
         * Formata os dados de um item do Google Books para um formato genérico.
         * @param {object} item - Objeto de volumeInfo da API do Google Books.
         * @returns {object} Objeto de livro formatado.
         */
        function formatGoogleBook(item) {
            const volumeInfo = item.volumeInfo;
            let isbn = null;
            if (volumeInfo.industryIdentifiers) {
                const isbn13 = volumeInfo.industryIdentifiers.find(id => id.type === 'ISBN_13');
                const isbn10 = volumeInfo.industryIdentifiers.find(id => id.type === 'ISBN_10');
                isbn = isbn13 ? isbn13.identifier : (isbn10 ? isbn10.identifier : null);
            }

            return {
                title: volumeInfo.title,
                subtitle: volumeInfo.subtitle, // Adicionado o subtítulo
                authors: volumeInfo.authors,
                publisher: volumeInfo.publisher,
                publishedDate: volumeInfo.publishedDate,
                description: volumeInfo.description,
                cover: volumeInfo.imageLinks && volumeInfo.imageLinks.thumbnail ? volumeInfo.imageLinks.thumbnail : null,
                isbn: isbn,
                source: 'Google Books',
                pageCount: volumeInfo.pageCount,
                language: volumeInfo.language,
                categories: volumeInfo.categories
            };
        }

        /**
         * Formata os dados de um documento da Open Library para um formato genérico.
         * @param {object} doc - Objeto de documento da API da Open Library.
         * @returns {object} Objeto de livro formatado.
         */
        function formatOpenLibraryBook(doc) {
            let authors = doc.author_name || [];
            if (!Array.isArray(authors)) {
                authors = [authors];
            }

            const publishedDate = doc.first_publish_year ? doc.first_publish_year.toString() : null;

            let cover = null;
            if (doc.cover_i) {
                cover = `https://covers.openlibrary.org/b/id/${doc.cover_i}-M.jpg`;
            } else if (doc.isbn && doc.isbn[0]) {
                cover = `https://covers.openlibrary.org/b/isbn/${doc.isbn[0]}-M.jpg`;
            }

            return {
                title: doc.title,
                authors: authors,
                publisher: doc.publisher && doc.publisher[0] ? doc.publisher[0] : null,
                publishedDate: publishedDate,
                // Pega a primeira frase ou uma descrição mais curta
                description: doc.first_sentence && doc.first_sentence[0] ? doc.first_sentence[0] + '...' : (doc.description ? (typeof doc.description === 'string' ? doc.description : doc.description.value) : null),
                cover: cover,
                isbn: doc.isbn && doc.isbn[0] ? doc.isbn[0] : null,
                source: 'Open Library',
                pageCount: doc.number_of_pages_median,
                language: doc.language && doc.language[0] ? doc.language[0].toUpperCase() : null,
                categories: doc.subject // Open Library usa 'subject' para categorias
            };
        }

        /**
         * Busca livros na API do Google Books.
         * @param {string} query - O ISBN ou termo de busca.
         * @param {boolean} isIsbn - Indica se a query é um ISBN.
         * @returns {Promise<Array>} Um array de objetos de livro formatados.
         */
        async function searchGoogleBooks(query, isIsbn = false) {
            let url;
            if (isIsbn) {
                url = `https://www.googleapis.com/books/v1/volumes?q=isbn:${query}`;
            } else {
                url = `https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}`;
            }

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    console.error('Erro Google Books:', errorData);
                    return [];
                }
                const data = await response.json();
                if (data.totalItems > 0) {
                    return data.items.map(formatGoogleBook);
                }
                return [];
            } catch (error) {
                console.error('Erro ao buscar no Google Books:', error);
                return [];
            }
        }

        /**
         * Busca livros na API da Open Library.
         * @param {string} query - O ISBN ou termo de busca.
         * @param {boolean} isIsbn - Indica se a query é um ISBN.
         * @returns {Promise<Array>} Um array de objetos de livro formatados.
         */
        async function searchOpenLibrary(query, isIsbn = false) {
            let url;
            if (isIsbn) {
                url = `https://openlibrary.org/search.json?isbn=${query}`;
            } else {
                url = `https://openlibrary.org/search.json?q=${encodeURIComponent(query)}`;
            }

            try {
                const response = await fetch(url);
                if (!response.ok) {
                    console.error('Erro Open Library:', response.status, response.statusText);
                    return [];
                }
                const data = await response.json();
                if (data.numFound > 0) {
                    return data.docs.map(formatOpenLibraryBook);
                }
                return [];
            } catch (error) {
                console.error('Erro ao buscar na Open Library:', error);
                return [];
            }
        }


        // Função principal para buscar informações do livro
        async function fetchBookInfo() {
            const searchInput = document.getElementById('searchInput');
            const searchButton = document.getElementById('searchButton');
            const buttonText = document.getElementById('buttonText');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const allResultsContainer = document.getElementById('allResultsContainer');

            const query = searchInput.value.trim();

            if (!query) {
                showMessage('Por favor, digite um ISBN ou um termo de busca.', 'text-red-600');
                clearResults();
                return;
            }

            const isbnRegex = /^(?:ISBN(?:-13)?:?)(?=[0-9]{13}$)([0-9]{3}-){2}[0-9]{3}[0-9X]$|^[0-9]{10}$/i;
            const isIsbn = isbnRegex.test(query);

            searchButton.disabled = true;
            buttonText.classList.add('hidden');
            loadingSpinner.classList.remove('hidden');
            showMessage('Buscando informações do livro...', 'text-blue-600');
            clearResults(); // Limpa todos os resultados anteriores

            let googleResults = [];
            let openLibraryResults = [];
            let totalResultsFound = 0;

            try {
                // Executa ambas as buscas em paralelo usando Promise.allSettled
                // Promise.allSettled permite que uma falha em uma API não pare a outra
                const [googleResponse, openLibraryResponse] = await Promise.allSettled([
                    searchGoogleBooks(query, isIsbn),
                    searchOpenLibrary(query, isIsbn)
                ]);

                if (googleResponse.status === 'fulfilled') {
                    googleResults = googleResponse.value;
                } else {
                    console.error('Falha na busca do Google Books:', googleResponse.reason);
                }

                if (openLibraryResponse.status === 'fulfilled') {
                    openLibraryResults = openLibraryResponse.value;
                } else {
                    console.error('Falha na busca da Open Library:', openLibraryResponse.reason);
                }

                // Exibe resultados do Google Books, se houver
                if (googleResults.length > 0) {
                    const googleHeader = document.createElement('h2');
                    googleHeader.className = 'text-2xl font-bold text-blue-700 mb-4 mt-6 text-center';
                    googleHeader.textContent = `Resultados do Google Books (${googleResults.length})`;
                    allResultsContainer.appendChild(googleHeader);

                    const googleResultsGrid = document.createElement('div');
                    googleResultsGrid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 mb-8';
                    allResultsContainer.appendChild(googleResultsGrid);

                    googleResults.forEach(book => renderBookCard(book, googleResultsGrid));
                    totalResultsFound += googleResults.length;
                }

                // Exibe resultados da Open Library, se houver
                if (openLibraryResults.length > 0) {
                    const openLibraryHeader = document.createElement('h2');
                    openLibraryHeader.className = 'text-2xl font-bold text-green-700 mb-4 mt-6 text-center';
                    openLibraryHeader.textContent = `Resultados da Open Library (${openLibraryResults.length})`;
                    allResultsContainer.appendChild(openLibraryHeader);

                    const openLibraryResultsGrid = document.createElement('div');
                    openLibraryResultsGrid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6';
                    allResultsContainer.appendChild(openLibraryResultsGrid);

                    openLibraryResults.forEach(book => renderBookCard(book, openLibraryResultsGrid));
                    totalResultsFound += openLibraryResults.length;
                }

                if (totalResultsFound === 0) {
                    showMessage('Nenhum resultado encontrado em nenhuma das fontes.', 'text-red-600');
                } else {
                    showMessage(`Total de resultados encontrados: ${totalResultsFound}`, 'text-green-600');
                }

            } catch (error) {
                showMessage(`Ocorreu um erro inesperado: ${error.message}`, 'text-red-600');
                console.error("Erro geral na busca:", error);
            } finally {
                searchButton.disabled = false;
                buttonText.classList.remove('hidden');
                loadingSpinner.classList.add('hidden');
            }
        }

        document.getElementById('searchButton').addEventListener('click', fetchBookInfo);

        document.getElementById('searchInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                fetchBookInfo();
            }
        });
    </script>
</body>

</html>
