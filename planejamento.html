<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Planejamento Mensal - Gemini BNCC</title>
    <style>
        :root {
            --primary: #1a73e8;
            --accent: #11734b;
            --bg: #f8f9fa;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: #202124;
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px solid #eaeded;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #202124;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }

        input[type="text"]:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #1557b0;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            font-weight: bold;
            color: var(--primary);
            margin-top: 20px;
        }

        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #202124;
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        .section-box {
            background: #fafbfc;
            border-left: 4px solid var(--primary);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
        }

        .section-title {
            font-weight: bold;
            color: #202124;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .section-content {
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-line;
        }

        .print-btn {
            background-color: #34495e;
            margin-top: 10px;
            width: auto;
            padding: 8px 15px;
            font-size: 14px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .print-btn:hover {
            background-color: #2c3e50;
        }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            .form-group, #btnGerar, h1, .loading, .print-btn { display: none !important; }
            .result-container { display: block !important; }
            .section-box { border: 1px solid #ddd; border-left: 4px solid #000; background: white; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📝 Gerador de Planejamento Mensal (Gemini)</h1>
        
        <div class="form-group">
            <label for="materia">Disciplina / Ano Escolar:</label>
            <input type="text" id="materia" placeholder="Ex: História - 7º Ano do Ensino Fundamental">
        </div>

        <div class="form-group">
            <label for="temas">Temas / Conteúdos do Mês:</label>
            <textarea id="temas" placeholder="Ex: As Grandes Navegações, a chegada dos espanhóis à América e o mercantilismo."></textarea>
        </div>

        <button id="btnGerar" onclick="gerarPlanejamento()">✨ Gerar Planejamento com Gemini</button>
        
        <div class="loading" id="loadingState">🤖 Consultando o Gemini e a estrutura da BNCC... Aguarde.</div>

        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <h2 style="margin:0; color: #202124;" id="docTitulo">Planejamento de Aula</h2>
                <button class="print-btn" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
            </div>

            <div class="section-box">
                <div class="section-title">Objetivos Gerais</div>
                <div class="section-content" id="resObjetivos"></div>
            </div>

            <div class="section-box">
                <div class="section-title">Unidades e Subunidades (BNCC) - Habilidades</div>
                <div class="section-content" id="resBncc"></div>
            </div>

            <div class="section-box">
                <div class="section-title">Metodologia</div>
                <div class="section-content" id="resMetodologia"></div>
            </div>

            <div class="section-box">
                <div class="section-title">Bibliografia Básica</div>
                <div class="section-content" id="resBibliografia"></div>
            </div>
        </div>
    </div>

    <script>
        const GEMINI_API_KEY = "AQ.Ab8RN6KGxINhUUjyjO_9PQttX8onnVMNt2UuHHBJ4fAF6xfAkQ";

        async function gerarPlanejamento() {
            const materia = document.getElementById('materia').value.trim();
            const temas = document.getElementById('temas').value.trim();
            
            if (!materia || !temas) {
                alert("Por favor, preencha a Disciplina e os Temas antes de gerar.");
                return;
            }

            document.getElementById('btnGerar').disabled = true;
            document.getElementById('loadingState').style.display = "block";
            document.getElementById('resultContainer').style.display = "none";

            const promptText = `Você é um assistente pedagógico especialista na BNCC. Com base na disciplina/ano "${materia}" e nos temas "${temas}", crie um planejamento mensal dividido estritamente nas 4 seções abaixo.

Importante: Traga códigos reais das habilidades da BNCC pertinentes ao ano e tema fornecidos. Não adicione textos extras antes ou depois do plano. Responda APENAS preenchendo as tags estruturantes abaixo:

[OBJETIVOS]
(coloque aqui os objetivos gerais)

[BNCC]
(coloque aqui as unidades, subunidades e códigos de habilidades da BNCC)

[METODOLOGIA]
(coloque aqui as metodologias de ensino sugeridas)

[BIBLIOGRAFIA]
(coloque aqui a bibliografia básica sugerida)`;

            try {
                // Atualizado para a API estável v1 e o modelo padrão atual gemini-2.5-flash
                const url = `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

                const response = await fetch(url, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        contents: [
                            {
                                parts: [
                                    { text: promptText }
                                ]
                            }
                        ],
                        generationConfig: {
                            temperature: 0.2
                        }
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error?.message || "Erro na comunicação com o Gemini.");
                }

                const data = await response.json();
                
                if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts[0]) {
                    const textoGerado = data.candidates[0].content.parts[0].text;
                    processarResposta(textoGerado, materia);
                } else {
                    throw new Error("A estrutura de resposta do Gemini veio em um formato desconhecido.");
                }

            } catch (error) {
                alert("Ocorreu um erro ao gerar: " + error.message);
                console.error(error);
            } finally {
                document.getElementById('btnGerar').disabled = false;
                document.getElementById('loadingState').style.display = "none";
            }
        }

        function processarResposta(texto, materia) {
            const regexObjetivos = /\[OBJETIVOS\]([\s\S]*?)(?=\[BNCC\]|\[METODOLOGIA\]|\[BIBLIOGRAFIA\]|$)/i;
            const regexBncc = /\[BNCC\]([\s\S]*?)(?=\[OBJETIVOS\]|\[METODOLOGIA\]|\[BIBLIOGRAFIA\]|$)/i;
            const regexMetodologia = /\[METODOLOGIA\]([\s\S]*?)(?=\[OBJETIVOS\]|\[BNCC\]|\[BIBLIOGRAFIA\]|$)/i;
            const regexBibliografia = /\[BIBLIOGRAFIA\]([\s\S]*?)(?=\[OBJETIVOS\]|\[BNCC\]|\[METODOLOGIA\]|$)/i;

            const objetivos = texto.match(regexObjetivos);
            const bncc = texto.match(regexBncc);
            const metodologia = texto.match(regexMetodologia);
            const bibliografia = texto.match(regexBibliografia);

            document.getElementById('resObjetivos').innerText = objetivos ? objetivos[1].trim() : texto;
            document.getElementById('resBncc').innerText = bncc ? bncc[1].trim() : "Estrutura não separada automaticamente.";
            document.getElementById('resMetodologia').innerText = metodologia ? metodologia[1].trim() : "Estrutura não separada automaticamente.";
            document.getElementById('resBibliografia').innerText = bibliografia ? bibliografia[1].trim() : "Estrutura não separada automaticamente.";

            document.getElementById('docTitulo').innerText = `Planejamento: ${materia}`;
            document.getElementById('resultContainer').style.display = "block";
            
            document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
