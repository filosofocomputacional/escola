<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Planejamento Mensal - BNCC</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #16a085;
            --bg: #f5f7fa;
            --card: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 800px;
            width: 100%;
            background: var(--card);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        h1 {
            color: var(--primary);
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px solid #eaeded;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--primary);
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #148f77;
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            font-weight: bold;
            color: var(--accent);
            margin-top: 20px;
        }

        /* Área de Resultado */
        .result-container {
            margin-top: 30px;
            display: none;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 5px;
            margin-bottom: 20px;
        }

        .section-box {
            background: #fafbfc;
            border-left: 4px solid var(--accent);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
        }

        .section-title {
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 5px;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 0.5px;
        }

        .section-content {
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-line; /* Mantém as quebras de linha da IA */
        }

        .print-btn {
            background-color: #34495e;
            margin-top: 10px;
        }
        .print-btn:hover {
            background-color: #2c3e50;
        }

        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; }
            .form-group, button, h1, .loading, .instructions { display: none !important; }
            .result-container { display: block !important; }
            .section-box { border: 1px solid #ddd; border-left: 4px solid #000; background: white; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📝 Gerador de Planejamento Mensal</h1>
        
        <!-- Formulário de Entrada -->
        <div class="form-group">
            <label for="materia">Disciplina / Ano Escolar:</label>
            <input type="text" id="materia" placeholder="Ex: História - 7º Ano do Ensino Fundamental">
        </div>

        <div class="form-group">
            <label for="temas">Temas / Conteúdos do Mês:</label>
            <textarea id="temas" placeholder="Ex: As Grandes Navegações, a chegada dos espanhóis à América e o mercantilismo."></textarea>
        </div>

        <button id="btnGerar" onclick="gerarPlanejamento()">✨ Gerar Planejamento com IA</button>
        
        <div class="loading" id="loadingState">🤖 Pensando e consultando a BNCC... Aguarde alguns segundos.</div>

        <!-- Layout do Documento Gerado -->
        <div class="result-container" id="resultContainer">
            <div class="result-header">
                <h2 style="margin:0; color: var(--primary);" id="docTitulo">Planejamento de Aula</h2>
                <button class="print-btn" onclick="window.print()">🖨️ Imprimir / Salvar PDF</button>
            </div>

            <div class="section-box">
                <div class="section-title">Objetivos Gerais</div>
                <div class="section-content" id="resObjetivos"></div>
            </div>

            <div class="section-box">
                <div class="section-title">Unidades e Subunidades (BNCC) - Habilidades</div>
                <div class="section-content" id="resBncc"></div>
            </div>

            <div class="section-box">
                <div class="section-title">Metodologia</div>
                <div class="section-content" id="resMetodologia"></div>
            </div>

            <div class="section-box">
                <div class="section-title">Bibliografia Básica</div>
                <div class="section-content" id="resBibliografia"></div>
            </div>
        </div>
    </div>

    <script>
        // Chave fornecida integrada diretamente para requisições do lado do cliente
        const GROQ_API_KEY = "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";

        async function gerarPlanejamento() {
            const materia = document.getElementById('materia').value.trim();
            const temas = document.getElementById('temas').value.trim();
            
            if (!materia || !temas) {
                alert("Por favor, preencha a Disciplina e os Temas antes de gerar.");
                return;
            }

            // Interface em modo de carregamento
            document.getElementById('btnGerar').disabled = true;
            document.getElementById('loadingState').style.display = "block";
            document.getElementById('resultContainer').style.style = "none";

            // Prompt focado em retornar respostas separadas por tags estruturadas
            const prompt = `Você é um assistente pedagógico especialista na BNCC e na elaboração de planos de aula estruturados.
Com base na disciplina/ano "${materia}" e nos temas/conteúdos do mês "${temas}", crie um planejamento mensal rigorosamente dividido nas 4 seções abaixo.

Regras importantes:
- Traga códigos reais das habilidades da BNCC adequados ao ano escolar informado.
- Use listas ou tópicos para deixar o texto limpo.
- Não adicione textos de introdução ou conclusão. Responda apenas o conteúdo das seções usando as tags exatas delimitadoras: [OBJETIVOS], [BNCC], [METODOLOGIA], e [BIBLIOGRAFIA].

Exemplo de formatação:
[OBJETIVOS]
(conteúdo aqui)
[BNCC]
(conteúdo aqui)
[METODOLOGIA]
(conteúdo aqui)
[BIBLIOGRAFIA]
(conteúdo aqui)`;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${GROQ_API_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            { role: "user", content: prompt }
                        ],
                        temperature: 0.3 // Baixa temperatura para manter a resposta focada, formal e factual (BNCC)
                    })
                });

                if (!response.ok) throw new Error("Erro na comunicação com o servidor do Groq.");

                const data = await response.json();
                const textoGerado = data.choices[0].messages?.content || data.choices[0].message.content;

                // Processa a string de resposta extraindo o conteúdo de cada bloco
                processarResposta(textoGerado, materia);

            } catch (error) {
                alert("Ocorreu um erro ao gerar o planejamento: " + error.message);
            } finally {
                document.getElementById('btnGerar').disabled = false;
                document.getElementById('loadingState').style.display = "none";
            }
        }

        function processarResposta(texto, materia) {
            // Regex para capturar o conteúdo entre as tags [TAG]
            const regexObjetivos = /\[OBJETIVOS\]([\s\S]*?)(?=\[BNCC\]|\[METODOLOGIA\]|\[BIBLIOGRAFIA\]|$)/i;
            const regexBncc = /\[BNCC\]([\s\S]*?)(?=\[OBJETIVOS\]|\[METODOLOGIA\]|\[BIBLIOGRAFIA\]|$)/i;
            const regexMetodologia = /\[METODOLOGIA\]([\s\S]*?)(?=\[OBJETIVOS\]|\[BNCC\]|\[BIBLIOGRAFIA\]|$)/i;
            const regexBibliografia = /\[BIBLIOGRAFIA\]([\s\S]*?)(?=\[OBJETIVOS\]|\[BNCC\]|\[METODOLOGIA\]|$)/i;

            const objetivos = texto.match(regexObjetivos);
            const bncc = texto.match(regexBncc);
            const metodologia = texto.match(regexMetodologia);
            const bibliografia = texto.match(regexBibliografia);

            // Se a IA falhar na tag exata, exibe o texto bruto no primeiro bloco para não perder os dados
            document.getElementById('resObjetivos').innerText = objetivos ? objetivos[1].trim() : texto;
            document.getElementById('resBncc').innerText = bncc ? bncc[1].trim() : "Verifique o campo acima ou tente gerar novamente.";
            document.getElementById('resMetodologia').innerText = metodologia ? metodologia[1].trim() : "Verifique o campo acima ou tente gerar novamente.";
            document.getElementById('resBibliografia').innerText = bibliografia ? bibliografia[1].trim() : "Verifique o campo acima ou tente gerar novamente.";

            // Atualiza o título e exibe o container do resultado
            document.getElementById('docTitulo').innerText = `Planejamento: ${materia}`;
            document.getElementById('resultContainer').style.display = "block";
            
            // Rola a página suavemente até o resultado
            document.getElementById('resultContainer').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
